<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Smart Parking System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <h2 class="text-center mb-4">Smart Parking System</h2>
    <h5 class="text-center text-muted mb-4">SRN: PES2UG23CS529</h5>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="card p-4 mb-4 shadow-sm">
        <h4 class="mb-3">Vehicle Entry</h4>

        <form action="/PES2UG23CS529/save" method="post">

            <div class="mb-3">
                <label>Vehicle Number</label>
                <input type="text" name="vehicleNumber" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Owner Name</label>
                <input type="text" name="ownerName" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Vehicle Type</label>
                <select name="vehicleType" class="form-select">
                    <option>Car</option>
                    <option>Bike</option>
                    <option>SUV</option>
                </select>
            </div>

            <div class="mb-3">
                <label>Slot Number</label>
                <input type="number" name="slotNumber" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">Submit</button>
        </form>
    </div>

    <div class="card p-4 shadow-sm">
        <h4 class="mb-3">Parking List</h4>

        <table class="table table-bordered table-striped">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Vehicle Number</th>
                    <th>Owner Name</th>
                    <th>Vehicle Type</th>
                    <th>Slot Number</th>
                    <th>Entry Time</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="p : ${list}">
                    <td th:text="${p.id}"></td>
                    <td th:text="${p.vehicleNumber}"></td>
                    <td th:text="${p.ownerName}"></td>
                    <td th:text="${p.vehicleType}"></td>
                    <td th:text="${p.slotNumber}"></td>
                    <td th:text="${p.entryTime}"></td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
